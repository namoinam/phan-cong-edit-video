  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  input:focus, select:focus { outline: none; border-color: #1456F0 !important; box-shadow: 0 0 0 3px rgba(20,86,240,0.12); }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1F2329; font-size: 13px; }
  .header { background: #fff; border-bottom: 1px solid #DEE0E3; padding: 12px 16px; display: flex; flex-direction: column; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
  .header h2 { font-family: 'Cubano', sans-serif; font-size: 30px; font-weight: 400; letter-spacing: 0.06em; color: #1F2329; text-transform: uppercase; text-align: center; line-height: 1; }
  .header-controls { display: flex; gap: 8px; align-items: center; width: 100%; }
  .header-filters { display: flex; gap: 8px; align-items: center; flex: 1; flex-wrap: wrap; }
  .header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
  .header-controls { display: flex; gap: 8px; align-items: center; flex: 1; flex-wrap: wrap; }
  input[type="text"] { padding: 6px 10px; border: 1px solid #DEE0E3; border-radius: 6px; font-size: 12px; width: 180px; color: #1F2329; }
  select { padding: 6px 8px; border: 1px solid #DEE0E3; border-radius: 6px; font-size: 12px; color: #1F2329; background: #fff; }
  .stats { font-size: 11px; color: #646A73; margin-left: auto; white-space: nowrap; }
  .btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; gap: 5px; }
  .btn-primary { background: #fff; color: #1F2329; border: 1px solid #DEE0E3; }
  .btn-reload { background: #fff; color: #1F2329; border: 1px solid #DEE0E3; }
  .status-bar { position: fixed; bottom: 32px; left: 0; right: 0; z-index: 20; padding: 6px 16px; font-size: 11px; background: #eff6ff; color: #1456F0; border-top: 1px solid #bfdbfe; }
  .status-bar.loading { background: #eff6ff; color: #1456F0; border-color: #bfdbfe; }
  .status-bar.error { background: #fef2f2; color: #dc2626; border-color: #fecaca; }
  .status-bar svg { width: 13px; height: 13px; vertical-align: -2px; margin-right: 6px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
  .spin { animation: spin 0.8s linear infinite; transform-origin: center; }
  @keyframes spin { to { transform: rotate(360deg); } }
  table { width: 100%; border-collapse: collapse; background: white; }
  thead { position: sticky; top: 57px; z-index: 9; }
  th { background: #F5F6F7; padding: 8px 10px; text-align: left; font-weight: 600; font-size: 11px; color: #9EA4AF; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 2px solid #DEE0E3; white-space: nowrap; }
  td { padding: 7px 10px; border-bottom: 1px solid #F0F1F3; vertical-align: middle; }
  tr:hover td { background: #F5F6F7; }
  tr.paused td { opacity: 0.5; }

let _history = [], _redo = [];
function snapshot() {                  // gọi TRƯỚC mỗi thay đổi để lưu trạng thái hiện tại
  _history.push(JSON.stringify(products));

function undo() {
  if (!_history.length) { setStatus('Không còn gì để hoàn tác', 'ok'); return; }

  products = JSON.parse(_history.pop());

  loading: '<svg class="spin" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>'
};
let _statusTimer = null;
function setStatus(msg, type='ok') {
  const el = document.getElementById('status-bar');
  const clean = msg.replace(/^[^\p{L}\p{N}]+/u, '');   // bỏ emoji/ký hiệu ở đầu → thay bằng icon SVG
  el.innerHTML = STATUS_ICONS[type] || '';
  const span = document.createElement('span');
  span.style.verticalAlign = 'middle';
  span.textContent = clean;
  el.appendChild(span);
  el.className = 'status-bar ' + type;
  el.style.display = 'block';          // luôn bật hiện (trước đó bị ẩn sau khi tải xong)
  clearTimeout(_statusTimer);
  if (type === 'ok') {                  // thông báo thành công tự ẩn sau 3s
    _statusTimer = setTimeout(() => { el.style.display = 'none'; }, 3000);
  }
}

function parseName(full) {
  const idx = full.indexOf(' - ');
  return idx === -1 ? {brand:'', name:full} : {brand:full.slice(0,idx), name:full.slice(idx+3)};
}

function calcConLai(p) {
  if (p.ton_video === undefined || p.ton_video === null) return null;
  let daChay = 0;
  if (p.ton_date) {   // số ngày kể từ lần cập nhật tồn gần nhất → tự trừ theo nhịp đăng
    const today = new Date(); today.setHours(0,0,0,0);
    const last  = new Date(p.ton_date); last.setHours(0,0,0,0);
    daChay = Math.round((today - last) / 86400000);
  }
  return p.ton_video / p.so_video_ngay - daChay;
}

function conLaiHTML(p) {
  const v = calcConLai(p);
  if (v === null) return `<span class="con-lai cl-chua">Chưa có dữ liệu</span>`;
  if (v < 0)  return `<span class="con-lai cl-het">Hết ${Math.abs(v).toFixed(1)} ngày trước</span>`;
  if (v === 0) return `<span class="con-lai cl-het">0 ngày</span>`;
  if (v <= 2) return `<span class="con-lai cl-do">${v.toFixed(1)} ngày</span>`;
  if (v <= 5) return `<span class="con-lai cl-vang">${v.toFixed(1)} ngày</span>`;
  return `<span class="con-lai cl-xanh">${v.toFixed(1)} ngày</span>`;
}

function tonVideoHTML(p, i) {
  const val = (p.ton_video !== undefined && p.ton_video !== null) ? p.ton_video : '';
  return `<input type="number" min="0" max="200" inputmode="numeric" value="${val}" placeholder="—"
    data-idx="${i}" data-field="ton_video"
    oninput="this.value=this.value.replace(/[^0-9]/g,'')"
    onchange="updateTonVideo(this)" ${p.status!=='active'?'disabled':''}>`;
}

function sortedIndexes() {
  const active = products
    .map((p, i) => ({p, i}))
    .filter(({p}) => p.status === 'active')
    .sort((a, b) => {
      const va = calcConLai(a.p), vb = calcConLai(b.p);
      if (va === null && vb === null) return 0;
      if (va === null) return 1;
      if (vb === null) return -1;
      return va - vb;
    });
  const paused = products.map((p,i) => ({p,i})).filter(({p}) => p.status !== 'active');
  return [...active, ...paused];
}

function renderTable() {
  const search = document.getElementById('search').value.toLowerCase();
  const filterStatus = document.getElementById('filter-status').value;
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  let shown=0, active=0, paused=0, sapHet=0;
  products.forEach(p => {
    p.status==='active' ? active++ : paused++;
    const v = calcConLai(p);
    if (p.status==='active' && v!==null && v<=2) sapHet++;
  });
  sortedIndexes().forEach(({p, i}) => {
    const matchSearch = p.name.toLowerCase().includes(search);
    const matchStatus = filterStatus==='all' || p.status===filterStatus;
    if (!matchSearch || !matchStatus) return;
    shown++;
    const {brand, name} = parseName(p.name);
    const keoDai = (p.videos_per_assign / p.so_video_ngay).toFixed(1);
    const bc = p.so_video_ngay>=5?'vpd-5':p.so_video_ngay>=3?'vpd-3':'vpd-1';
    const tr = document.createElement('tr');
    if (p.status!=='active') tr.classList.add('paused');
    tr.innerHTML = `
      <td style="text-align:center"><input type="checkbox" class="row-check" data-idx="${i}" ${selected.has(p.name)?'checked':''} ${p.status!=='active'?'disabled title="SP không giao — không tích được"':''} onchange="toggleRowCheck(this)" style="width:16px;height:16px;cursor:${p.status!=='active'?'not-allowed':'pointer'}"></td>
      <td><span class="sp-name">${name}</span><br><span class="brand">${brand}</span></td>
      <td><input type="number" min="1" max="100" inputmode="numeric" value="${p.videos_per_assign}" data-idx="${i}" data-field="videos_per_assign" onchange="updateField(this)" oninput="this.value=this.value.replace(/[^0-9]/g,'')" ${p.status!=='active'?'disabled':''}></td>
      <td>
        <div class="vpd-wrap ${bc}">
          <div class="vpd-dot"></div>
          <input type="number" min="1" max="10" inputmode="numeric" value="${p.so_video_ngay}" data-idx="${i}" data-field="so_video_ngay" onchange="updateField(this)" oninput="this.value=this.value.replace(/[^0-9]/g,'')" style="width:64px" ${p.status!=='active'?'disabled':''}>
        </div>
      </td>
      <td>${tonVideoHTML(p, i)}</td>
      <td title="Kéo dài: ~${keoDai} ngày/lần" style="text-align:center">${conLaiHTML(p)}</td>
      <td><div style="display:flex;gap:10px;align-items:center">
        <select class="status-sel st-${p.status}" data-idx="${i}" onchange="changeStatus(this)">
          <option value="active" ${p.status==='active'?'selected':''}>Đang giao</option>
          <option value="het_hang" ${p.status==='het_hang'?'selected':''}>Hết hàng</option>
          <option value="loi_link" ${p.status==='loi_link'?'selected':''}>Lỗi link</option>
          <option value="paused" ${p.status==='paused'?'selected':''}>Tạm dừng</option>
        </select>
        <button onclick="deleteProduct(${i})" title="Xóa SP" style="padding:4px 6px;border-radius:4px;border:1px solid #DEE0E3;background:#fff;color:#9EA4AF;cursor:pointer;display:flex;align-items:center;line-height:1" onmouseover="this.style.borderColor='#fca5a5';this.style.color='#b91c1c'" onmouseout="this.style.borderColor='#DEE0E3';this.style.color='#9EA4AF'"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
      </div></td>
    `;
    tbody.appendChild(tr);
  });
  _statActive = active; _statPaused = paused; _statShown = shown;
  refreshStats();
  syncCheckAll();
}

function toggleRowCheck(el) {
  const idx = +el.dataset.idx;
  const name = products[idx].name;
  if (el.checked) selected.add(name); else selected.delete(name);
  refreshStats();
  syncCheckAll();
}

function updateField(el) {
  const idx = +el.dataset.idx;
  const field = el.dataset.field;
  snapshot();
  products[idx][field] = parseInt(el.value) || 1;
  renderTable();   // đổi đăng/ngày hoặc cần edit → sắp xếp lại ngay
}
function updateTonVideo(el) {
  const idx = +el.dataset.idx;
  const val = el.value.trim();
  snapshot();
  if (val === '') {                 // chỉ để TRỐNG mới là "chưa có dữ liệu"
    delete products[idx].ton_video;
    delete products[idx].ton_date;
  } else {                          // 0 là giá trị hợp lệ = hết hàng
    products[idx].ton_video = parseInt(val);
    const t = new Date();
    products[idx].ton_date = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  }
  renderTable();   // chỉnh tồn → SP tự nhảy về đúng vị trí ưu tiên
}
function changeStatus(sel) {
  const idx = +sel.dataset.idx;
  snapshot();
  products[idx].status = sel.value;
  if (sel.value !== 'active') selected.delete(products[idx].name);  // không giao thì bỏ chọn
  renderTable();
}
function toggleAddForm() {
  const f = document.getElementById('add-form');
  const o = document.getElementById('add-overlay');
  const show = f.style.display === 'none';
  f.style.display = show ? 'block' : 'none';
  o.style.display = show ? 'block' : 'none';
  if (show) document.getElementById('add-name').focus();
}
function deleteProduct(idx) {
  if (!confirm(`Xóa "${products[idx].name}"?`)) return;
  snapshot();
  selected.delete(products[idx].name);
  products.splice(idx, 1);
  renderTable();
  setStatus('✅ Đã xóa SP — nhớ bấm Lưu!', 'ok');
}
function confirmAdd() {
  const name = document.getElementById('add-name').value.trim();
  const vpa  = parseInt(document.getElementById('add-vpa').value) || 10;
  const vpd  = parseInt(document.getElementById('add-vpd').value) || 1;
  if (!name) { alert('Nhập tên sản phẩm!'); return; }
  snapshot();
  products.push({ name, videos_per_assign: vpa, so_video_ngay: vpd, status: 'active' });
  document.getElementById('add-name').value = '';
  document.getElementById('add-vpa').value = '10';
  document.getElementById('add-vpd').value = '1';
  toggleAddForm();
  renderTable();
  setStatus('✅ Đã thêm SP mới — nhớ bấm Lưu!', 'ok');
}

function _getToken() {
  let t = localStorage.getItem('gh_token');
  if (!t) {
    t = prompt('Nhập GitHub token (lưu 1 lần):');
    if (t) localStorage.setItem('gh_token', t);
  }
  return t;
}

async function syncFromLocal() {
  setStatus('⏳ Đang tải dữ liệu...', 'loading');
  try {
    const TOKEN = _getToken();
    if (!TOKEN) { setStatus('❌ Cần GitHub token để tải dữ liệu', 'error'); return; }
    const REPO  = 'namoinam/phan-cong-edit-video';
    const res = await fetch(
      `https://api.github.com/repos/${REPO}/contents/products.json`,
      { headers: { 'Authorization': 'token ' + TOKEN, 'Cache-Control': 'no-cache' } }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    _productsSha = data.sha;
    const jsonStr = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
    const parsed = JSON.parse(jsonStr);
    products = Array.isArray(parsed) ? parsed : (parsed.products || parsed);
    _loadedFromFile = true;
    _history = []; _redo = [];
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('sync-time').textContent = `Cập nhật ${hh}:${mm}`;
    document.getElementById('status-bar').style.display = 'none';
    renderTable();
  } catch(e) {
    setStatus('⚠️ Không tải được — hiển thị dữ liệu có sẵn. Lỗi: ' + e.message, 'error');
  }
}

async function saveToLocal() {
  if (!_loadedFromFile) {
    setStatus('Chưa nạp được dữ liệu từ GitHub — KHÔNG lưu để tránh ghi đè. Bấm ↻ trước.', 'error');
    return;
  }
  if (!_productsSha) {
    setStatus('Thiếu SHA — bấm ↻ để tải lại rồi thử lưu lại.', 'error');
    return;
  }
  setStatus('⏳ Đang lưu lên GitHub...', 'loading');
  try {
    const TOKEN = _getToken();
    if (!TOKEN) { setStatus('❌ Cần GitHub token để lưu', 'error'); return; }
    const REPO  = 'namoinam/phan-cong-edit-video';
    const content = JSON.stringify(products, null, 2);
    const b64 = btoa(unescape(encodeURIComponent(content)));
    const res = await fetch(
      `https://api.github.com/repos/${REPO}/contents/products.json`,
      {
        method: 'PUT',
        headers: { 'Authorization': 'token ' + TOKEN, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: 'Update products ' + new Date().toISOString().slice(0, 10),
          content: b64,
          sha: _productsSha
        })
      }
    );
    const result = await res.json();
    if (result.commit) {
      _productsSha = result.content.sha;
      setStatus('✅ Đã lưu lên GitHub!', 'ok');
    } else {
      throw new Error(JSON.stringify(result).substring(0, 120));
    }
  } catch(e) {
    setStatus('❌ Lỗi lưu: ' + e.message, 'error');
  }
}

function toggleAllChecks(el) {
  // chỉ áp dụng cho các dòng đang hiển thị; vẫn ghi nhớ vào selected
  document.querySelectorAll('.row-check').forEach(cb => {
    if (cb.disabled) return;          // bỏ qua SP đang tạm dừng
    cb.checked = el.checked;
    const name = products[+cb.dataset.idx].name;
    if (el.checked) selected.add(name); else selected.delete(name);
  });
  refreshStats();
}

function giaEdit() {
  if (!selected.size) {
    setStatus('Chưa tick SP nào — tick checkbox trước rồi bấm Giao edit', 'error');
    return;
  }
  // gửi TẤT CẢ SP đã tích — kể cả SP đang bị ẩn do tìm/lọc. Format: "[Cần edit] [Tên SP]"
  const text = products.filter(p => selected.has(p.name))
    .map(p => `${p.videos_per_assign} ${p.name}`).join('\n');
  const n = selected.size;
  if (typeof sendPrompt === 'function') {
    sendPrompt(text);                       // gửi thẳng vào khung chat → kích hoạt skill giao edit
    setStatus(`Đã gửi ${n} SP sang chat để giao edit`, 'ok');
  } else {
    openGiaoModal(text, n);                  // không gửi thẳng được → hiện ô để copy
  }
}

function openGiaoModal(text, n) {
  const ta = document.getElementById('giao-text');
  ta.value = text;
  document.getElementById('giao-hint').innerHTML = `<b>${n}</b> SP — bấm <b>Copy</b> rồi dán (Cmd/Ctrl+V) vào khung chat.`;
  document.getElementById('giao-overlay').style.display = 'block';
  document.getElementById('giao-modal').style.display = 'block';
  ta.focus(); ta.select();
}
function closeGiaoModal() {
  document.getElementById('giao-overlay').style.display = 'none';
  document.getElementById('giao-modal').style.display = 'none';
}
function copyGiaoList(btn) {
  const ta = document.getElementById('giao-text');
  ta.focus(); ta.select(); ta.setSelectionRange(0, ta.value.length);
  let ok = false;
  try { ok = document.execCommand('copy'); } catch(e) {}
  if (!ok && navigator.clipboard) {
    navigator.clipboard.writeText(ta.value).then(() => { btn.textContent = 'Đã copy ✓'; }).catch(() => {});
  }
  btn.textContent = ok ? 'Đã copy ✓' : 'Đã bôi đen — bấm Cmd/Ctrl+C';
}

// Phím tắt: Ctrl/Cmd+Z = hoàn tác, Ctrl/Cmd+Shift+Z hoặc Ctrl/Cmd+Y = làm lại, Ctrl/Cmd+S = lưu
document.addEventListener('keydown', (e) => {
  const mod = e.metaKey || e.ctrlKey;
  if (!mod) return;
  const k = e.key.toLowerCase();
  if (k === 's') { e.preventDefault(); saveToLocal(); }
  else if (k === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
  else if ((k === 'z' && e.shiftKey) || k === 'y') { e.preventDefault(); redo(); }
});

// Đóng băng tiêu đề cột ngay dưới header (tự tính chiều cao header, kể cả khi đổi kích thước)
function syncHeaderOffset() {
  const h = document.querySelector('.header');
  const thead = document.querySelector('thead');
  if (h && thead) thead.style.top = (Math.round(h.getBoundingClientRect().height) - 1) + 'px';  // -1 để đè khít, không hở viền
}
window.addEventListener('resize', syncHeaderOffset);
window.addEventListener('load', syncHeaderOffset);

renderTable();
syncFromLocal();
syncHeaderOffset();
setTimeout(syncHeaderOffset, 200);
</script>
