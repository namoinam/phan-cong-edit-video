@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F5F6F7;padding:24px;color:#1F2329}
.date-nav{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;margin-bottom:6px}
.nav-btn{background:none;border:none;font-size:20px;cursor:pointer;color:#1456F0;padding:0 4px;line-height:1;opacity:0.5;transition:opacity .15s}
.nav-btn:hover:not(:disabled){opacity:1}
.nav-btn:disabled{opacity:0.15;cursor:default}
.date-banner{font-size:22px;font-weight:700;letter-spacing:0.03em;color:#1456F0;text-transform:uppercase}
h1{font-size:20px;font-weight:500;margin-bottom:20px;color:#1F2329}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:32px}
.card{background:#FFFFFF;border:1px solid #DEE0E3;border-radius:12px;padding:16px 20px}
.hdr{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.av{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0}
.name{font-weight:600;font-size:15px;color:#1F2329}
.cnt{font-size:13px;color:#646A73;margin-top:1px}
.list{border-top:1px solid #DEE0E3;padding-top:10px;display:flex;flex-direction:column;gap:5px}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.pname{font-size:13px;background:#EEF3FF;color:#1456F0;border-radius:8px;padding:4px 10px;flex:1;font-weight:500}
.pct{font-size:13px;color:#646A73;white-space:nowrap}
.section{background:#FFFFFF;border:1px solid #DEE0E3;border-radius:12px;padding:20px 24px;margin-bottom:16px}
h2{font-size:16px;font-weight:600;margin-bottom:16px;color:#1F2329}
.link-table{width:100%;border-collapse:collapse}
.link-table tr{border-bottom:1px solid #DEE0E3}
.link-table tr:last-child{border-bottom:none}
.link-table td{padding:10px 0;font-size:13px}
.link-table td:first-child{color:#1F2329;width:55%}
.link-table td:last-child{text-align:right}
.link-table a{color:#1456F0;text-decoration:none;font-size:13px;font-weight:500}
.link-table a:hover{text-decoration:underline}
.no-link{color:#646A73;font-size:13px}
.loading{color:#646A73;font-size:13px;padding:12px 0}
</style>
</head>

<div class="section">
  <h2>Danh sách &amp; link sản phẩm edit</h2>
  <table class="link-table" id="link-table"><tr><td class="loading">Đang tải...</td></tr></table>
</div>

<script>
const EMPLOYEES = ['Thư','Sơn','Dung','Duyên','Hiếu','Thắm','Trân','Tuyên'];
let historyData = {};
let dates = [];
let idx = 0;

function fmtDate(iso) {
  const [y,m,d] = iso.split('-');
  return d+'/'+m+'/'+y;
}

function updateNav() {
  document.getElementById('prev-btn').disabled = idx <= 0;
  document.getElementById('next-btn').disabled = idx >= dates.length - 1;
}

function render(date) {
  const data = historyData[date];
  document.getElementById('date-banner').textContent = 'SẢN PHẨM EDIT NGÀY ' + fmtDate(date);
  EMPLOYEES.forEach(emp => {
    const listEl = document.getElementById('list-' + emp);
    const cntEl  = document.getElementById('cnt-'  + emp);
    if (!listEl) return;
    const items = (data.assignments && data.assignments[emp]) || [];
    const total = items.reduce((s,p) => s+p.count, 0);
    cntEl.textContent = total + ' video';
    listEl.innerHTML = items.map(p =>
      '<div class="row"><span class="pname">'+p.name+'</span><span class="pct">'+p.count+' video</span></div>'
    ).join('');
  });
  const table = document.getElementById('link-table');
  const links = data.links || [];
  table.innerHTML = links.map(l =>
    l.url
      ? '<tr><td>'+l.full_name+'</td><td><a href="'+l.url+'" target="_blank">Mở thư mục Drive &#8594;</a></td></tr>'
      : '<tr><td>'+l.full_name+'</td><td><span class="no-link">Không tìm thấy</span></td></tr>'
  ).join('');
}

function navigate(dir) {
  idx = Math.max(0, Math.min(dates.length-1, idx+dir));
  render(dates[idx]);
  updateNav();
}

(async function init() {
  try {
    const res = await fetch('history.json?t='+Date.now());
    historyData = await res.json();
    dates = Object.keys(historyData).sort();
    idx = dates.length - 1;
    render(dates[idx]);
    updateNav();
  } catch(e) {
    const today = new Date();
    const iso = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
    document.getElementById('date-banner').textContent = 'SẢN PHẨM EDIT NGÀY ' + fmtDate(iso);
    document.getElementById('link-table').innerHTML = '<tr><td class="loading">Không tải được lịch sử</td></tr>';
  }
})();
</script>
