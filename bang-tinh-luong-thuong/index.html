<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Be Vietnam Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg-soft);
    color: var(--text);
    padding-top: 0px; /* adjusted top padding */
    padding-bottom: 80px; /* offset for fixed footer */
  }
  .navbar {
    display: none !important;
  }
  .container-custom {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
  }
  .header {
    background: var(--bg-soft);
    border-bottom: 1px solid var(--border);
    padding: 24px 0 16px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    position: sticky;
    top: 0px;
    z-index: 100;
  }
  .header h2 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
    text-transform: uppercase;
    line-height: 1.2;
    text-align: center;
  }
  .header-sub {
    font-size: 13px;
    color: var(--text-sub);
  }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    margin-bottom: 20px;
    box-shadow: var(--shadow-sm);
    flex-wrap: wrap;
  }
  .toolbar label {
    font-size: 12px;
    color: var(--text-sub);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .toolbar select, .toolbar input {
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
    transition: var(--trans);
  }
  .btn {
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: var(--trans);
  }
  .btn-primary {
    background: var(--blue);
    color: #fff;
  }
  .btn-primary:hover {
    background: var(--blue-hover);
  }
  .btn-outline {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-outline:hover {
    background: var(--bg-soft);
    border-color: var(--border-dark);
  }
  .sep {
    width: 1px;
    height: 20px;
    background: var(--border);
    margin: 0 4px;
  }
  .cs3-bar {
    display: none;
    background: var(--bg-blue);
    border: 1px solid var(--blue-border);
    border-radius: var(--radius-md);
    padding: 12px 20px;
    gap: 24px;
    font-size: 13px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    box-shadow: var(--shadow-sm);
  }
  .cs3-bar.show {
    display: flex;
  }
  .cs3-stat {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .cs3-stat .lbl {
    color: var(--text-sub);
    font-weight: 500;
  }
  .cs3-stat .val {
    font-weight: 700;
    color: var(--blue);
  }
  .section {
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    margin-bottom: 24px;
    background: var(--card-bg);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    padding: 0;
  }
  .section-head {
    padding: 14px 20px;
    background: var(--bg-soft);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .section-head .nm {
    font-weight: 800;
    font-size: 15px;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .section-head .tag {
    font-weight: 600;
    font-size: 11px;
    color: var(--text-sub);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    padding: 20px;
  }
  .card {
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 18px 20px;
    background: var(--card-bg);
    transition: var(--trans);
  }
  .card:hover {
    border-color: var(--blue-border);
    box-shadow: var(--shadow-sm);
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 14px;
  }
  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    overflow: hidden;
  }
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .card-info {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-info h3 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin: 0;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 700;
    margin-top: 2px;
    border: 1px solid;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .badge-cs1 {
    background: #FFF7ED;
    color: #9A3412;
    border-color: #FED7AA;
  }
  .badge-cs2l {
    background: #EEF2FF;
    color: #3730A3;
    border-color: #C7D2FE;
  }
  .badge-cs3 {
    background: #F0FDF4;
    color: #166534;
    border-color: #BBF7D0;
  }
  .cut {
    color: #DC2626;
    font-weight: 700;
  }
  .coef-select {
    width: 68px;
    padding: 5px 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    text-align: center;
    cursor: pointer;
    background: var(--bg);
    color: var(--text);
  }
  .off-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .off-row label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: .05em;
    flex: 1;
  }
  .off-row input {
    width: 68px;
    padding: 5px 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    text-align: center;
    color: var(--text);
    background: var(--bg);
  }
  .breakdown {
    display: none;
    background: var(--bg-soft);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 12px;
    border: 1px solid var(--border);
  }
  .breakdown.show {
    display: block;
  }
  .brow {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 4px 0;
  }
  .brow .lbl {
    color: var(--text-sub);
  }
  .brow.total {
    border-top: 1px solid var(--border);
    margin-top: 8px;
    padding-top: 8px;
    font-size: 13px;
    font-weight: 700;
    color: var(--blue);
  }
  .qr-wrap {
    display: none;
  }
  .qr-wrap.show {
    display: block;
  }
  .btn-qr {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg-soft);
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    transition: var(--trans);
  }
  .btn-qr:hover {
    border-color: var(--blue);
    color: #fff;
    background: var(--blue);
  }
  .qr-box {
    display: none;
    margin-top: 12px;
    border-top: 1px dashed var(--border);
    padding-top: 12px;
  }
  .qr-box.open {
    display: block;
  }
  .qr-img {
    text-align: center;
    margin-bottom: 12px;
  }
  .qr-img img {
    width: 160px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    padding: 6px;
    background: #fff;
  }
  .qr-meta {
    font-size: 11px;
    color: var(--text-sub);
    margin-top: 6px;
    text-align: center;
    line-height: 1.5;
  }
  .qr-text {
    background: var(--bg-soft);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    border: 1px solid var(--border);
  }
  .qr-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    padding: 4px 0;
  }
  .qr-row .k {
    color: var(--text-muted);
  }
  .qr-row .v {
     font-weight: 600;
     color: var(--text);
     font-family: monospace;
     font-size: 13px;
  }
  .qr-amount .v {
     color: var(--blue);
     font-size: 15px;
     font-weight: 700;
  }
  .copy-btn {
     padding: 2px 8px;
     border: 1px solid var(--border);
     border-radius: var(--radius-sm);
     background: var(--bg);
     font-size: 10px;
     color: var(--text-sub);
     cursor: pointer;
     font-weight: 600;
     transition: var(--trans);
  }
  .copy-btn:hover {
     border-color: var(--blue);
     color: var(--blue);
  }
  .copy-btn.copied {
     border-color: #16a34a;
     color: #16a34a;
     background: #f0fdf4;
  }
  .footer {
     position: fixed;
     bottom: 0;
     left: 0;
     right: 0;
     background: var(--bg-soft);
     border-top: 1px solid var(--border);
     padding: 10px 16px;
     font-size: 12px;
     color: var(--text-muted);
     display: flex;
     justify-content: space-between;
     align-items: center;
     z-index: 10;
  }
  .footer-total {
     font-size: 14px;
     font-weight: 700;
     color: var(--blue);
  }
  input:focus, select:focus {
     outline: none;
     border-color: var(--blue) !important;
     box-shadow: 0 0 0 3px var(--blue-dim);
  }

  @media (max-width: 768px) {
    body { padding-top: 0px; }
    .header { padding: 16px 0 12px 0; position: static; }
    .header h2 { font-size: 22px; }
    .toolbar { flex-direction: column; align-items: stretch; padding: 12px; gap: 10px; }
    .toolbar label { margin-bottom: -4px; }
    .toolbar select, .toolbar input { width: 100% !important; }
    .toolbar .sep { display: none; }
    .toolbar .btn { width: 100%; justify-content: center; }
    .cs3-bar { flex-direction: column; gap: 8px; padding: 12px; }
    .grid { grid-template-columns: 1fr; padding: 10px; }
    .card { padding: 14px 16px; }
  }
</style>
</head>

<script>
// Sticky header offset fix
document.addEventListener("DOMContentLoaded", () => {
  const updateStickyOffset = () => {
    document.body.style.paddingTop = "0px";
  };
  window.addEventListener("resize", updateStickyOffset);
  updateStickyOffset();
});

// Mobile Menu Burger Toggle
const burger = document.getElementById('burger');
const mobileMenu = document.getElementById('mobile-menu');
const closeBtn = document.getElementById('mobile-menu-close');
if (burger && mobileMenu && closeBtn) {
  burger.addEventListener('click', () => {
    mobileMenu.classList.add('open');
    document.body.style.overflow = 'hidden';
  });
  const closeMenu = () => {
    mobileMenu.classList.remove('open');
    document.body.style.overflow = '';
  };
  closeBtn.addEventListener('click', closeMenu);
  mobileMenu.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', closeMenu);
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMenu(); });
}
</script>

const POL={
  CS1:{label:'CHÍNH SÁCH 1',salary:6000000,cls:'badge-cs1'},
  CS2L:{label:'CHÍNH SÁCH 2',salary:11000000,cls:'badge-cs2l'},
  CS3:{label:'CHÍNH SÁCH 3',salary:10000000,cls:'badge-cs3'},
};
const ORDER=['CS1','CS2L','CS3'];
const td={};
function fmt(n){return Math.round(n).toLocaleString('vi-VN')+'đ';}
function num(n){return(Math.round(n*100)/100).toLocaleString('vi-VN');}
function daysOf(m,y){return new Date(y,m,0).getDate();}
function autoFillDays() {
  const m = +document.getElementById('sel-m').value;
  const y = +document.getElementById('inp-y').value;
  const D = daysOf(m, y);
  EMP.forEach(e => {
    const inp = document.getElementById('off-' + e.id);
    if (inp) {
      if (+inp.value > D) inp.value = D;
    }
  });
  calculate();
}
function qrUrl(bank,acct,amt,name,info){return`https://img.vietqr.io/image/${bank}-${acct}-compact2.jpg?amount=${Math.round(amt)}&addInfo=${encodeURIComponent(info)}&accountName=${encodeURIComponent(name)}`;}
function copyText(text, btn) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'Đã copy';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 2000);
    });
  } else {
    const textArea = document.createElement("textarea");
    textArea.value = text;
    textArea.style.position = "fixed";
    document.body.appendChild(textArea);
    textArea.focus();
    textArea.select();
    try {
      document.execCommand('copy');
      btn.textContent = 'Đã copy';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 2000);
    } catch (err) {
      console.error('Fallback copy failed', err);
    }
    document.body.removeChild(textArea);
  }
}
function copyAll(id){const d=td[id];if(!d)return;copyText(`Ngân hàng: ${d.bankName}\nSố TK: ${d.acct}\nChủ TK: ${d.full}\nSố tiền: ${d.amtStr}\nNội dung: ${d.memo}`,document.getElementById('copy-all-'+id));}
function toggleQR(id){const box=document.getElementById('qrbox-'+id);const btn=document.getElementById('qrbtn-'+id);const isOpen=box.classList.toggle('open');btn.textContent=isOpen?'ẨN THÔNG TIN CHUYỂN KHOẢN':'THÔNG TIN CHUYỂN KHOẢN';}
function updateCoef(id,coef){const emp=EMP.find(e=>e.id===id);if(emp){emp.coef=parseFloat(coef);calculate();}}
function cardHtml(e){
  const p=POL[e.policy];
  const coefOptions=[0.8,0.9,1.0,1.1,1.2].map(v=>`<option value="${v}" ${e.coef===v?'selected':''}>${v}</option>`).join('');
  const coef=e.policy==='CS3'?`<div class="off-row"><label>HỆ SỐ</label><select id="coef-${e.id}" class="coef-select" onchange="updateCoef('${e.id}', this.value)">${coefOptions}</select><span style="font-size:11px;visibility:hidden">ngày</span>${e.cut?' <span class="cut">cắt thưởng</span>':''}</div>`:'';
  const av=IMG[e.id]?`<img src="${IMG[e.id]}" alt="${e.name}">`:e.ini;
  return`<div class="card">
<div class="card-header"><div style="display:flex;align-items:center;gap:10px;"><div class="avatar" style="background:${e.color}">${av}</div><div class="card-info"><h3>${e.name}</h3></div></div></div>
${coef}
<div class="off-row"><label>Ngày nghỉ</label><input type="text" inputmode="numeric" id="off-${e.id}" value="0" placeholder="0" oninput="this.value=this.value.replace(/[^0-9]/g,''); const D=daysOf(+document.getElementById('sel-m').value, +document.getElementById('inp-y').value); if(+this.value&gt;D)this.value=D; calculate();"><span style="font-size:11px;color:#9EA4AF">ngày</span></div>
<div class="breakdown" id="bd-${e.id}"></div>
<div class="qr-wrap" id="qrw-${e.id}">
  <button class="btn-qr" id="qrbtn-${e.id}" onclick="toggleQR('${e.id}')">THÔNG TIN CHUYỂN KHOẢN</button>
  <div class="qr-box" id="qrbox-${e.id}">
    <div class="qr-img" id="qrimg-wrap-${e.id}">
      <img id="qrimg-${e.id}" src="" alt="QR" onload="document.getElementById('qrtext-${e.id}').style.display='none';this.parentElement.style.display='block';" onerror="this.parentElement.style.display='none';document.getElementById('qrtext-${e.id}').style.display='block';">
      <div class="qr-meta" id="qrmeta-${e.id}"></div>
    </div>
    <div class="qr-text" id="qrtext-${e.id}" style="display:none">
      <div class="qr-row qr-amount"><span class="k">Số tiền</span><span class="v" id="qt-amt-${e.id}">—</span></div>
      <div class="qr-row"><span class="k">Ngân hàng</span><span class="v">${e.bankName}</span></div>
      <div class="qr-row"><span class="k">Số TK</span><span style="display:flex;align-items:center;gap:6px"><span class="v">${e.acct}</span><button class="copy-btn" onclick="copyText('${e.acct}',this)">Copy</button></span></div>
      <div class="qr-row"><span class="k">Chủ TK</span><span class="v" style="font-size:10px">${e.full}</span></div>
      <div style="margin-top:6px"><button class="copy-btn" style="width:100%;padding:5px" id="copy-all-${e.id}" onclick="copyAll('${e.id}')">Copy toàn bộ</button></div>
    </div>
  </div>
</div></div>`;
}
function renderGrid(){
  document.getElementById('board').innerHTML=ORDER.map(pol=>{
    const p=POL[pol];const list=EMP.filter(e=>e.policy===pol);
    const extra=pol==='CS3'?' + THƯỞNG ĐƠN THEO HỆ SỐ':'';
    return`<div class="section"><div class="section-head"><span class="nm">${p.label}</span><span class="tag">${list.length} NGƯỜI  •  LƯƠNG CỨNG: ${fmt(p.salary)}${extra}</span></div><div class="grid">${list.map(cardHtml).join('')}</div></div>`;
  }).join('');
}
function calculate(){
  const m=+document.getElementById('sel-m').value,y=+document.getElementById('inp-y').value;
  const D=daysOf(m,y);
  const orders=+document.getElementById('inp-orders').value||0;
  const label=`HO KINH DOANH NAM OI NAM CK LUONG T${m}${y}`;
  const pool=orders*0.8*1000;
  const cs3List=EMP.filter(e=>e.policy==='CS3');
  const tongHeSo=cs3List.reduce((s,e)=>s+(e.coef||0),0);
  const divisor=cs3List.length>=3?tongHeSo:3;
  const tienHeSo=divisor?pool/divisor:0;
  if(orders>0){
    document.getElementById('cs3-a').textContent=orders.toLocaleString('vi-VN')+' đơn';
    document.getElementById('cs3-b').textContent=num(orders*0.8)+' đơn';
    document.getElementById('cs3-c').textContent=fmt(pool);
    document.getElementById('cs3-bar').classList.add('show');
  } else document.getElementById('cs3-bar').classList.remove('show');
  let grand=0;
  EMP.forEach(e=>{
    const off = Math.min(D, +document.getElementById('off-' + e.id).value || 0);
    const worked = Math.max(0, D - off);
    const base=POL[e.policy].salary/D*worked;
    let total,bdHtml;
    if(e.policy==='CS3'){
      const baseR=Math.round(base);
      const bonus=e.cut?0:Math.round((e.coef||0)*tienHeSo);
      total=baseR+bonus;
      const bl=e.cut?`Thưởng đơn <span class="cut">(đã cắt)</span>`:`Thưởng đơn (HS ${e.coef})`;
      bdHtml=`<div class="brow"><span class="lbl">Lương cứng (${worked}/${D})</span><span>${fmt(baseR)}</span></div><div class="brow"><span class="lbl">${bl}</span><span>${fmt(bonus)}</span></div><div class="brow total"><span>Tổng nhận</span><span>${fmt(total)}</span></div>`;
    } else {
      total=Math.round(base);
      bdHtml=`<div class="brow"><span class="lbl">Lương (${worked}/${D} ngày)</span><span>${fmt(total)}</span></div><div class="brow total"><span>Tổng nhận</span><span>${fmt(total)}</span></div>`;
    }
    grand+=total;
    document.getElementById('bd-'+e.id).innerHTML=bdHtml;document.getElementById('bd-'+e.id).classList.add('show');
    document.getElementById('qrw-'+e.id).classList.add('show');
    document.getElementById('qrimg-'+e.id).src=qrUrl(e.bank,e.acct,total,e.full,label);
    document.getElementById('qrmeta-'+e.id).innerHTML=`${e.bankName} · ${e.acct}<br><strong>${e.full}</strong>`;
    document.getElementById('qt-amt-'+e.id).textContent=fmt(total);
    td[e.id]={bankName:e.bankName,acct:e.acct,full:e.full,amtStr:fmt(total),memo:label};
    document.getElementById('qrbox-'+e.id).classList.remove('open');
    document.getElementById('qrbtn-'+e.id).textContent='THÔNG TIN CHUYỂN KHOẢN';
  });
  document.getElementById('hdr-sub').textContent=`Tháng ${m}/${y} · ${D} ngày`;
  document.getElementById('footer-period').textContent=`Tháng ${m}/${y} · ${D} ngày · ${EMP.length} nhân sự`;
  document.getElementById('footer-total').textContent='Tổng: '+fmt(grand);
}
function resetAll(){
  EMP.forEach(e=>{
    document.getElementById('off-'+e.id).value=0;
    document.getElementById('bd-'+e.id).classList.remove('show');
    document.getElementById('qrw-'+e.id).classList.remove('show');
    document.getElementById('qrbox-'+e.id).classList.remove('open');
    const btn=document.getElementById('qrbtn-'+e.id);if(btn)btn.textContent='THÔNG TIN CHUYỂN KHOẢN';
  });
  document.getElementById('cs3-bar').classList.remove('show');
  document.getElementById('inp-orders').value=0;
  document.getElementById('hdr-sub').textContent='Chọn tháng và nhập số liệu để tính lương';
  document.getElementById('footer-period').textContent='—';
  document.getElementById('footer-total').textContent='';
}
renderGrid();
calculate();
</script>
