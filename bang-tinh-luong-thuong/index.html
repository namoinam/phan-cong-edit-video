*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F6F7;color:#1F2329;}
.header{background:#F5F6F7;border-bottom:1px solid #DEE0E3;padding:24px;display:flex;flex-direction:column;align-items:center;gap:8px;position:sticky;top:0;z-index:10;}
.header h2{font-family:'Cubano',sans-serif;font-size:30px;font-weight:400;letter-spacing:.04em;color:#1F2329;text-transform:uppercase;line-height:1;text-align:center;}
.header-sub{font-size:11px;color:#9EA4AF;}
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 24px;border-bottom:1px solid #DEE0E3;flex-wrap:wrap;background:#fff;}
.toolbar label{font-size:11px;color:#646A73;font-weight:500;}
.toolbar select,.toolbar input[type="number"]{padding:5px 8px;border:1px solid #DEE0E3;border-radius:6px;font-size:12px;color:#1F2329;background:#fff;}
.btn{padding:6px 12px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:4px;}
.btn-primary{background:#1456F0;color:#fff;}.btn-primary:hover{background:#0f46cc;}
.btn-outline{background:#fff;color:#1F2329;border:1px solid #DEE0E3;}.btn-outline:hover{background:#F5F6F7;}
.sep{width:1px;height:18px;background:#DEE0E3;margin:0 2px;}
.cs3-bar{display:none;background:#F0F5FF;border-bottom:1px solid #C7D7FD;padding:7px 16px;gap:20px;font-size:12px;flex-wrap:wrap;}
.cs3-bar.show{display:flex;}.cs3-stat{display:flex;gap:5px;align-items:center;}
.cs3-stat .lbl{color:#646A73;}.cs3-stat .val{font-weight:600;color:#1456F0;}
.section{border:1px solid #DEE0E3;border-radius:12px;margin:20px 24px 20px;overflow:hidden;}
.section-head{padding:12px 20px;background:#FAFBFF;border-bottom:1px solid #DEE0E3;display:flex;align-items:baseline;gap:8px;}
.section-head .nm{font-weight:700;font-size:14px;color:#1F2329;letter-spacing:.02em;}
.section-head .tag{font-weight:500;font-size:11px;color:#646A73;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;padding:16px 20px 20px;}
.card{border:1px solid #DEE0E3;border-radius:12px;padding:16px 20px;background:#fff;}
.card:hover{background:#FAFBFF;}
.card-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;display:block;}
.card-info{display:flex;align-items:center;gap:8px;}
.card-info h3{font-size:14px;font-weight:600;color:#1F2329;margin:0;}
.badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;margin-top:2px;border:1px solid;}
.badge-cs1{background:#FFF7ED;color:#9A3412;border-color:#FED7AA;}
.badge-cs2l{background:#EEF2FF;color:#3730A3;border-color:#C7D2FE;}
.badge-cs3{background:#F0FDF4;color:#166534;border-color:#BBF7D0;}
.cut{color:#DC2626;font-weight:600;}
.coef-select{padding:2px 6px;border:1px solid #DEE0E3;border-radius:4px;font-size:11px;cursor:pointer;background:#fff;color:#1F2329;}
.off-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.off-row label{font-size:11px;color:#9EA4AF;text-transform:uppercase;letter-spacing:.4px;flex:1;}
.off-row input{width:58px;padding:4px 6px;border:1px solid #DEE0E3;border-radius:6px;font-size:12px;text-align:center;color:#1F2329;}
.breakdown{display:none;background:#F5F6F7;border-radius:6px;padding:10px 12px;margin-bottom:10px;}
.breakdown.show{display:block;}
.brow{display:flex;justify-content:space-between;font-size:13px;padding:2px 0;}
.brow .lbl{color:#646A73;}
.brow.total{border-top:1px solid #DEE0E3;margin-top:6px;padding-top:6px;font-size:13px;font-weight:700;color:#1456F0;}
.qr-wrap{display:none;}.qr-wrap.show{display:block;}
.btn-qr{width:100%;padding:6px;border:1px solid #DEE0E3;border-radius:6px;background:#fff;font-size:11px;color:#646A73;cursor:pointer;font-weight:500;}
.btn-qr:hover{border-color:#1456F0;color:#1456F0;background:#F0F5FF;}
.qr-box{display:none;margin-top:10px;}.qr-box.open{display:block;}
.qr-img{text-align:center;}.qr-img img{width:150px;border-radius:8px;border:1px solid #DEE0E3;}
.qr-meta{font-size:10px;color:#9EA4AF;margin-top:5px;text-align:center;line-height:1.5;}
.qr-text{background:#F5F6F7;border-radius:6px;padding:10px 12px;}
.qr-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:3px 0;}
.qr-row .k{color:#9EA4AF;}.qr-row .v{font-weight:600;color:#1F2329;font-family:monospace;}
.qr-amount .v{color:#1456F0;font-size:13px;}
.copy-btn{padding:2px 8px;border:1px solid #DEE0E3;border-radius:6px;background:#fff;font-size:10px;color:#646A73;cursor:pointer;}
.copy-btn:hover{border-color:#1456F0;color:#1456F0;}.copy-btn.copied{border-color:#16a34a;color:#16a34a;}
.footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #DEE0E3;padding:6px 16px;font-size:11px;color:#9EA4AF;display:flex;justify-content:space-between;align-items:center;z-index:10;}
.footer-total{font-size:13px;font-weight:700;color:#1456F0;}
input:focus,select:focus{outline:none;border-color:#1456F0!important;box-shadow:0 0 0 3px rgba(20,86,240,.12);}
</style>

const POL={
  CS1:{label:'CHÍNH SÁCH 1',salary:6000000,cls:'badge-cs1'},
  CS2L:{label:'CHÍNH SÁCH 2',salary:11000000,cls:'badge-cs2l'},
  CS3:{label:'CHÍNH SÁCH 3',salary:10000000,cls:'badge-cs3'},
};
const ORDER=['CS1','CS2L','CS3'];
const td={};
function fmt(n){return Math.round(n).toLocaleString('vi-VN')+'đ';}
function num(n){return(Math.round(n*100)/100).toLocaleString('vi-VN');}
function daysOf(m,y){return new Date(y,m,0).getDate();}
function autoFillDays(){document.getElementById('inp-d').value=daysOf(+document.getElementById('sel-m').value,+document.getElementById('inp-y').value);}
function qrUrl(bank,acct,amt,name,info){return`https://img.vietqr.io/image/${bank}-${acct}-compact2.jpg?amount=${Math.round(amt)}&addInfo=${encodeURIComponent(info)}&accountName=${encodeURIComponent(name)}`;}
function copyText(text,btn){navigator.clipboard.writeText(text).then(()=>{btn.textContent='Đã copy';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2000);});}
function copyAll(id){const d=td[id];if(!d)return;copyText(`Ngân hàng: ${d.bankName}\nSố TK: ${d.acct}\nChủ TK: ${d.full}\nSố tiền: ${d.amtStr}\nNội dung: ${d.memo}`,document.getElementById('copy-all-'+id));}
function toggleQR(id){const box=document.getElementById('qrbox-'+id);const btn=document.getElementById('qrbtn-'+id);const open=box.classList.toggle('open');btn.textContent=open?'Ẩn QR / Thông tin CK':'Hiện QR / Thông tin CK';}
function updateCoef(id,coef){const emp=EMP.find(e=>e.id===id);if(emp){emp.coef=parseFloat(coef);calculate();}}
function cardHtml(e){
  const p=POL[e.policy];
  const coefOptions=[0.8,0.9,1.0,1.1,1.2].map(v=>`<option value="${v}" ${e.coef===v?'selected':''}>${v}</option>`).join('');
  const sub=e.policy==='CS3'?` Hệ số: <select id="coef-${e.id}" class="coef-select" onchange="updateCoef('${e.id}', this.value)">${coefOptions}</select>${e.cut?' <span class="cut">cắt thưởng</span>':''}`:'';
  const av=IMG[e.id]?`<img src="${IMG[e.id]}" alt="${e.name}">`:e.ini;
  return`<div class="card">
<div class="card-header"><div style="display:flex;align-items:center;gap:10px;"><div class="avatar" style="background:${e.color}">${av}</div><div class="card-info"><h3>${e.name}</h3></div></div><div>${sub}</div></div>
<div class="off-row"><label>Ngày nghỉ</label><input type="number" id="off-${e.id}" value="0" min="0" max="31" onchange="calculate()"><span style="font-size:11px;color:#9EA4AF">ngày</span></div>
<div class="breakdown" id="bd-${e.id}"></div>
<div class="qr-wrap" id="qrw-${e.id}">
  <button class="btn-qr" id="qrbtn-${e.id}" onclick="toggleQR('${e.id}')">Hiện QR / Thông tin CK</button>
  <div class="qr-box" id="qrbox-${e.id}">
    <div class="qr-img" id="qrimg-wrap-${e.id}">
      <img id="qrimg-${e.id}" src="" alt="QR" onload="document.getElementById('qrtext-${e.id}').style.display='none';this.parentElement.style.display='block';" onerror="this.parentElement.style.display='none';document.getElementById('qrtext-${e.id}').style.display='block';">
      <div class="qr-meta" id="qrmeta-${e.id}"></div>
    </div>
    <div class="qr-text" id="qrtext-${e.id}" style="display:none">
      <div class="qr-row qr-amount"><span class="k">Số tiền</span><span class="v" id="qt-amt-${e.id}">—</span></div>
      <div class="qr-row"><span class="k">Ngân hàng</span><span class="v">${e.bankName}</span></div>
      <div class="qr-row"><span class="k">Số TK</span><span style="display:flex;align-items:center;gap:6px"><span class="v">${e.acct}</span><button class="copy-btn" onclick="copyText('${e.acct}',this)">Copy</button></span></div>
      <div class="qr-row"><span class="k">Chủ TK</span><span class="v" style="font-size:10px">${e.full}</span></div>
      <div style="margin-top:6px"><button class="copy-btn" style="width:100%;padding:5px" id="copy-all-${e.id}" onclick="copyAll('${e.id}')">Copy toàn bộ</button></div>
    </div>
  </div>
</div></div>`;
}
function renderGrid(){
  document.getElementById('board').innerHTML=ORDER.map(pol=>{
    const p=POL[pol];const list=EMP.filter(e=>e.policy===pol);
    const extra=pol==='CS3'?' + Thưởng đơn theo hệ số':'';
    return`<div class="section"><div class="section-head"><span class="nm">${p.label}</span><span class="tag">${list.length} NGƯỜI  •  LƯƠNG CỨNG: ${fmt(p.salary)}${extra}</span></div><div class="grid">${list.map(cardHtml).join('')}</div></div>`;
  }).join('');
}
function calculate(){
  const m=+document.getElementById('sel-m').value,y=+document.getElementById('inp-y').value;
  const D=+document.getElementById('inp-d').value||daysOf(m,y);
  const orders=+document.getElementById('inp-orders').value||0;
  const label=`Luong T${m}/${y}`;
  const pool=orders*0.8*1000;
  const cs3List=EMP.filter(e=>e.policy==='CS3');
  const tongHeSo=cs3List.reduce((s,e)=>s+(e.coef||0),0);
  const divisor=cs3List.length>=3?tongHeSo:3;
  const tienHeSo=divisor?pool/divisor:0;
  if(orders>0){
    document.getElementById('cs3-a').textContent=orders.toLocaleString('vi-VN')+' đơn';
    document.getElementById('cs3-b').textContent=num(orders*0.8)+' đơn';
    document.getElementById('cs3-c').textContent=fmt(pool);
    document.getElementById('cs3-d').textContent=num(divisor);
    document.getElementById('cs3-e').textContent=fmt(tienHeSo);
    document.getElementById('cs3-bar').classList.add('show');
  } else document.getElementById('cs3-bar').classList.remove('show');
  let grand=0;
  EMP.forEach(e=>{
    const off=+document.getElementById('off-'+e.id).value||0,worked=D-off;
    const base=POL[e.policy].salary/D*worked;
    let total,bdHtml;
    if(e.policy==='CS3'){
      const baseR=Math.round(base);
      const bonus=e.cut?0:Math.round((e.coef||0)*tienHeSo);
      total=baseR+bonus;
      const bl=e.cut?`Thưởng đơn <span class="cut">(đã cắt)</span>`:`Thưởng đơn (HS ${e.coef})`;
      bdHtml=`<div class="brow"><span class="lbl">Lương cứng (${worked}/${D})</span><span>${fmt(baseR)}</span></div><div class="brow"><span class="lbl">${bl}</span><span>${fmt(bonus)}</span></div><div class="brow total"><span>Tổng nhận</span><span>${fmt(total)}</span></div>`;
    } else {
      total=Math.round(base);
      bdHtml=`<div class="brow"><span class="lbl">Lương (${worked}/${D} ngày)</span><span>${fmt(total)}</span></div><div class="brow total"><span>Tổng nhận</span><span>${fmt(total)}</span></div>`;
    }
    grand+=total;
    document.getElementById('bd-'+e.id).innerHTML=bdHtml;document.getElementById('bd-'+e.id).classList.add('show');
    document.getElementById('qrw-'+e.id).classList.add('show');
    document.getElementById('qrimg-'+e.id).src=qrUrl(e.bank,e.acct,total,e.full,label);
    document.getElementById('qrmeta-'+e.id).innerHTML=`${e.bankName} · ${e.acct}<br><strong>${e.full}</strong>`;
    document.getElementById('qt-amt-'+e.id).textContent=fmt(total);
    td[e.id]={bankName:e.bankName,acct:e.acct,full:e.full,amtStr:fmt(total),memo:label};
    document.getElementById('qrbox-'+e.id).classList.add('open');
    document.getElementById('qrbtn-'+e.id).textContent='Ẩn QR / Thông tin CK';
  });
  document.getElementById('hdr-sub').textContent=`Tháng ${m}/${y} · ${D} ngày`;
  document.getElementById('footer-period').textContent=`Tháng ${m}/${y} · ${D} ngày · ${EMP.length} nhân sự`;
  document.getElementById('footer-total').textContent='Tổng: '+fmt(grand);
}
function resetAll(){
  EMP.forEach(e=>{
    document.getElementById('off-'+e.id).value=0;
    document.getElementById('bd-'+e.id).classList.remove('show');
    document.getElementById('qrw-'+e.id).classList.remove('show');
    document.getElementById('qrbox-'+e.id).classList.remove('open');
    const btn=document.getElementById('qrbtn-'+e.id);if(btn)btn.textContent='Hiện QR / Thông tin CK';
  });
  document.getElementById('cs3-bar').classList.remove('show');
  document.getElementById('inp-orders').value=0;
  document.getElementById('hdr-sub').textContent='Chọn tháng và nhập số liệu để tính lương';
  document.getElementById('footer-period').textContent='—';
  document.getElementById('footer-total').textContent='';
}
renderGrid();autoFillDays();
</script>
</body>
</html>
