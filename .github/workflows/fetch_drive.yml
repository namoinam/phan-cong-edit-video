name: TikTok Daily Inventory Update

on:
  schedule:
    # 23:00 UTC = 06:00 AM UTC+7 (Vietnam Time)
    - cron: '0 23 * * *'
  workflow_dispatch: # Cho phép kích hoạt thủ công từ giao diện GitHub

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-oauthlib requests

      - name: Write credentials and tokens
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json
          echo '${{ secrets.GOOGLE_TOKEN_JSON }}' > token.json

      - name: Run script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python fetch_drive.py

      - name: Clean up temporary credentials
        run: |
          rm -f credentials.json token.json

      - name: Commit and push changes
        run: |
          git config --global user.name "namoinam-bot"
          git config --global user.email "bot@namoinam.com"
          git add products.json drive_folder_cache.json
          git diff-index --quiet HEAD || git commit -m "Auto-update products and cache $(date +'%Y-%m-%d')"
          git push origin main
