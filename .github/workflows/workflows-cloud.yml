name: TikTok Cloud Workflows

on:
  schedule:
    # 23:00 UTC = 06:00 AM VN Time (Chạy workflow buổi sáng)
    - cron: '0 23 * * *'
    # 13:30 UTC = 20:30 PM VN Time (Chạy workflow kiểm tra đăng bài buổi tối)
    - cron: '30 13 * * *'
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Chọn workflow để chạy thủ công (morning / nightly)'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - nightly

jobs:
  morning-workflow:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 23 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job_type == 'morning')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth pg8000

      - name: Run Morning Sync
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GITHUB_ACTIONS: "true"
        run: python fetch_drive_cloud.py

  nightly-workflow:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 13 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job_type == 'nightly')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pg8000

      - name: Run Nightly Publish Check
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tiktok_publish_checker.py
